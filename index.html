<!DOCTYPE html>
<html>

<head>
    <title>My Drone Portfolio</title>

    <meta charset="utf-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Swipe Slider Plugin -->
    <script src="https://unpkg.com/leaflet-side-by-side"></script>

    <style>

        body {
            margin: 0;
            font-family: Arial;
        }

        header {
            background: #111;
            color: white;
            padding: 20px;
            text-align: center;
        }

        #map {
            width: 100%;
            height: 600px;
        }

        .content {
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

    </style>
</head>

<body>

<header>
    <h1>My Drone Portfolio</h1>
    <p>Drone Mapping | GIS | Aerial Photography</p>
</header>

<div class="content">

    <h2>About Me</h2>

    <p>
        FAA Part 107 drone pilot specializing in
        mapping, GIS, and aerial imaging.
    </p>

    <h2>Change Detection Example</h2>

</div>

<div id="map"></div>

<script>

    // Create map

    var map = L.map('map').setView([40.7128, -74.0060], 16);

    // Base map

    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            attribution:
            '&copy; OpenStreetMap contributors'
        }
    ).addTo(map);

    // BEFORE image

    var before = L.imageOverlay(
        'before.jpg',
        [[40.708, -74.012],
         [40.717, -73.998]]
    );

    // AFTER image

    var after = L.imageOverlay(
        'after.jpg',
        [[40.708, -74.012],
         [40.717, -73.998]]
    );

    before.addTo(map);
    after.addTo(map);

    // Slider

    L.control.sideBySide(
        before,
        after
    ).addTo(map);

</script>

</body>
</html>
